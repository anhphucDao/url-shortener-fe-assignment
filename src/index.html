<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- QR Code -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="navbar">
      <a href="https://fessior.com" target="_self">
        <div class="logo">
          <img src="https://fessior.com/icons/fessior_navy.svg" alt="Logo" />
          <h4>Fessior Tools</h4>
        </div>
      </a>
    </div>
    <div class="content">
      <!-- Description -->
      <div class="des">
        <h1>URL Shortener</h1>
        <p>Simplify, Organize and Share: URL Management Made Easy</p>
      </div>
      <!-- Form -->
      <div class="form-container">
        <!-- Long URL input -->
        <div class="form-group">
          <label for="long-url">Your long URL</label>
          <div class="main-input">
            <span class="icon">🔗</span>
            <input
              type="text"
              id="long-url"
              class="url-input"
              placeholder="Input the URL you want to shorten"
            />
            <button class="shorten-btn">Shorten</button>
          </div>
        </div>
      </div>
    </div>
    <div id="shorten-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div class="modal-header">
          <div id="qrcode"></div>
          <button class="download-qr"><i class="fas fa-download"></i></button>
        </div>
        <div class="modal-body">
          <h3>Link shortened!</h3>
          <p>
            Access the "My URL" page to view statistics on your shortened links.
          </p>
          <div class="result-box">
            <input
              type="text"
              id="result-url"
              placeholder="Shortened URL will appear here"
              readonly
            />
            <button id="copy-btn-modal"><i class="fas fa-copy"></i></button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
